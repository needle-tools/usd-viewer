name: Release
on:
  push:
    branches:
      - 'release/*'

jobs:
  run-release-script:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # Required for git tags
      id-token: write   # Required for OIDC trusted publishing
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # Fetch all submodules recursively

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish to npm (stable branch)
        if: startsWith(github.ref_name, 'release/stable')
        run: npx --yes needle-publish-helper@stable publish "./usd-wasm" --webhook "${{ secrets.DISCORD_WEBHOOK }}" --oidc --tag "stable" --create-tag "release/"

      - name: Publish to npm (latest branch)
        if: startsWith(github.ref_name, 'release/latest')
        run: npx --yes needle-publish-helper@stable publish "./usd-wasm" --webhook "${{ secrets.DISCORD_WEBHOOK }}" --oidc --tag "latest" --create-tag "release/"

      - name: Publish to npm (next and experimental branches)
        if: ${{ !startsWith(github.ref_name, 'release/stable') && !startsWith(github.ref_name, 'release/latest') }}
        run: npx --yes needle-publish-helper@stable publish "./usd-wasm" --webhook "${{ secrets.DISCORD_WEBHOOK }}" --oidc --tag "${{ github.ref_name }}" --version+time --version+name --version+tag --version+hash --create-tag "release/"
