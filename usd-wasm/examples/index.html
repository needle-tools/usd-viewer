<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vite + TS</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    canvas {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
    }
    .test-buttons {
      position: absolute;
      top: 0;
      left: 0;
      padding: 10px;
      background-color: rgba(0,0,0,0.5);
      color: white;
      z-index: 1000;
      max-width: min(540px, calc(100vw - 20px));
      max-height: calc(100vh - 20px);
      overflow: auto;
      font-family: system-ui, sans-serif;
      font-size: 12px;
    }

    .control-group {
      margin-bottom: 8px;
    }

    .control-group h2 {
      margin: 5px 3px;
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    .test-buttons button {
      margin: 3px;
      color: white;
      background-color: rgb(63, 107, 18);
      border: none;
      outline: none;
      border-radius: 5px;
      cursor: pointer;
      padding: 5px 8px;
      font: inherit;
    }

    .test-buttons button:hover {
      background-color: rgba(224, 224, 224, 0.8);
      color: black;
    }

    .options button {
      background-color: rgb(75, 75, 75);
    }

    .scene-control-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: center;
      margin: 4px 3px;
    }

    .scene-control-row span {
      min-width: 0;
      overflow-wrap: anywhere;
      color: rgba(255,255,255,0.9);
    }

    .scene-control-row select {
      min-width: 96px;
      color: white;
      background-color: rgb(34, 34, 34);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      padding: 4px 6px;
      font: inherit;
    }

    .status {
      margin: 5px 3px 0;
      color: rgba(255,255,255,0.85);
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
